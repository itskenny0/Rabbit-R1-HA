name: Release

on:
  push:
    tags:
      - 'r1ha-[0-9][0-9][0-9][0-9][0-9][0-9][0-9][0-9]'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Parse version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          YYYYMMDD="${TAG#r1ha-}"
          YYYY="${YYYYMMDD:0:4}"
          MM="${YYYYMMDD:4:2}"
          DD="${YYYYMMDD:6:2}"
          echo "version_code=${YYYYMMDD}" >> "$GITHUB_OUTPUT"
          echo "version_name=${YYYY}.${MM}.${DD}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build APK
        env:
          APP_VERSION_CODE: ${{ steps.version.outputs.version_code }}
          APP_VERSION_NAME: ${{ steps.version.outputs.version_name }}
        run: ./gradlew :app:assembleDebug

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             "r1ha-${{ steps.version.outputs.version_name }}.apk"

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | grep '^r1ha-' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s")
          else
            NOTES=$(git log --pretty=format:"- %s")
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          draft: false
          prerelease: false
          files: r1ha-${{ steps.version.outputs.version_name }}.apk
